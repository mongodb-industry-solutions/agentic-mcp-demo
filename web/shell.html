<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agentic AI — Web Shell</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0a;
    --surface: #111111;
    --border:  #1e1e1e;
    --green:   #00ff88;
    --yellow:  #ffd700;
    --cyan:    #00d4ff;
    --red:     #ff4d6a;
    --blue:    #4d9fff;
    --dim:     rgba(255,255,255,0.32);
    --text:    rgba(255,255,255,0.88);
    --mono:    'JetBrains Mono', 'SF Mono', monospace;

    /* full-line colors per tag */
    --c-bootstrap: var(--blue);
    --c-query:     var(--yellow);
    --c-agent:     var(--cyan);
    --c-routing:   #ffffff;
    --c-action:    #ffffff;
    --c-result:    var(--green);
    --c-error:     var(--red);
    --c-react:     #ffffff;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    font-size: 13px;
    line-height: 1.38;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Banner ── */
  .banner {
    border: 1px solid var(--green);
    border-radius: 6px;
    margin: 14px 14px 0;
    padding: 12px 18px;
    flex-shrink: 0;
  }
  .banner-title { color: var(--green); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .banner-meta  { color: var(--dim); font-size: 11px; margin-top: 6px; }
  .banner-meta span { color: var(--cyan); }

  /* ── Two-column body ── */
  .columns {
    flex: 1;
    display: flex;
    min-height: 0;
    gap: 0;
  }

  /* ── Left: chat ── */
  .col-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid var(--border);
  }

  #history {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    scroll-behavior: smooth;
  }
  #history::-webkit-scrollbar { width: 5px; }
  #history::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

  .input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-prompt { color: var(--blue); font-weight: 700; white-space: nowrap; user-select: none; }
  #queryInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    caret-color: var(--green);
  }
  #queryInput::placeholder { color: var(--dim); }
  .input-hint { color: var(--dim); font-size: 11px; white-space: nowrap; }
  #rSearchBar {
    display: none;
    padding: 4px 14px;
    border-top: 1px solid var(--border);
    background: rgba(0,212,255,0.06);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--dim);
    white-space: pre;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  #rSearchBar .rsq { color: var(--cyan); }
  #rSearchBar .rsu { color: var(--text); text-decoration: underline; text-decoration-color: var(--cyan); }

  /* ── Right: log + servers ── */
  .col-log {
    width: 40%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Tab bar */
  .right-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .right-tab {
    padding: 7px 16px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .right-tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* Log pane */
  #logPanel {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.35;
  }
  #logPanel::-webkit-scrollbar { width: 4px; }
  #logPanel::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  /* Servers pane */
  #serversPanel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    font-size: 12px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  #serversPanel.visible { display: flex; }

  .server-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    gap: 8px;
  }
  .server-name  { color: var(--text); font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .server-badge {
    font-size: 10px; padding: 1px 7px; border-radius: 3px; flex-shrink: 0;
    font-weight: 600; text-transform: uppercase;
  }
  .server-badge.local   { background: rgba(0,212,255,0.10);  color: var(--cyan); }
  .server-badge.cloud   { background: rgba(204,136,255,0.12); color: #cc88ff; }
  .server-active        { font-size: 10px; color: var(--green); }
  .server-inactive      { font-size: 10px; color: var(--dim); }
  .server-remove {
    background: none; border: 1px solid #333; border-radius: 4px;
    color: var(--dim); font-size: 11px; padding: 2px 8px; cursor: pointer;
    font-family: var(--mono);
  }
  .server-remove:hover { border-color: var(--red); color: var(--red); }

  /* Add server button */
  .add-server-btn {
    margin-top: 4px; padding: 7px; border-radius: 5px; cursor: pointer;
    border: 1px dashed #333; color: var(--dim); font-size: 12px;
    font-family: var(--mono); background: none; text-align: center;
  }
  .add-server-btn:hover { border-color: var(--green); color: var(--green); }

  /* Add server modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: #141414; border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 22px;
    width: 540px; max-width: 95vw; display: flex; flex-direction: column; gap: 12px;
  }
  .modal h3 { color: var(--green); font-size: 13px; font-weight: 700; }
  .modal label { color: var(--dim); font-size: 11px; display: block; margin-bottom: 4px; }
  .modal input, .modal textarea {
    width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
    border-radius: 4px; color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 7px 10px; outline: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--green); }
  .modal textarea { height: 220px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 6px 16px; border-radius: 4px; font-family: var(--mono);
    font-size: 12px; cursor: pointer; border: 1px solid #333;
  }
  .btn-primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-cancel  { background: none; color: var(--dim); }
  .btn-cancel:hover  { color: var(--text); border-color: #555; }
  .modal-result { font-size: 11px; padding: 4px 0; }

  .log-entry {
    padding: 1px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* markdown rendered inside log entries and workstream cards */
  .log-entry p, .log-entry ul, .log-entry ol { margin: 0; }
  .log-entry strong { font-weight: 700; }
  .log-entry em { font-style: italic; }
  .log-entry code { background: rgba(255,255,255,0.08); border-radius: 2px; padding: 0 3px; }
  .ws-summary-md p, .ws-summary-md ul, .ws-summary-md ol { margin: 0 0 2px; }
  .ws-summary-md strong { font-weight: 700; }
  .ws-summary-md code { background: rgba(255,255,255,0.08); border-radius: 2px; padding: 0 3px; }
  /* full-line coloring by tag */
  .log-entry.tag-BOOTSTRAP { color: var(--c-bootstrap); }
  .log-entry.tag-QUERY     { color: var(--c-query);     }
  .log-entry.tag-AGENT     { color: var(--c-agent);     }
  .log-entry.tag-ROUTING   { color: var(--c-routing);   }
  .log-entry.tag-ACTION    { color: var(--c-action);    }
  .log-entry.tag-RESULT    { color: var(--c-result);    }
  .log-entry.tag-ERROR     { color: var(--c-error);     }
  .log-entry.tag-REACT     { color: var(--c-react);     }
  .log-entry.tag-INFO      { color: var(--dim);         }
  .log-entry .log-tag { font-weight: 700; }

  /* ── Chat history entries ── */
  .you-line {
    color: var(--blue); font-weight: 700;
    margin: 12px 0 2px;
  }
  .you-line span { color: var(--text); font-weight: 400; }

  .thinking {
    color: var(--dim); font-size: 12px; padding: 3px 0; display: none;
  }
  .thinking.active { display: block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .thinking-dot { animation: blink 1s infinite; }

  .turn-sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ── Response panel ── */
  .response-panel {
    border: 1px solid var(--green);
    border-radius: 6px;
    margin: 10px 0 4px;
    overflow: hidden;
  }
  .response-panel-title {
    background: rgba(0,255,136,0.06);
    color: var(--green);
    font-size: 11px; font-weight: 600;
    padding: 5px 14px;
    border-bottom: 1px solid rgba(0,255,136,0.12);
    user-select: none;
  }
  .response-panel-body {
    padding: 12px 16px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
  }
  .response-panel-body p               { margin-bottom: 10px; }
  .response-panel-body p:last-child    { margin-bottom: 0; }
  .response-panel-body h1,
  .response-panel-body h2,
  .response-panel-body h3 { color: var(--green); margin: 12px 0 6px; font-size: 13px; }
  .response-panel-body ul,
  .response-panel-body ol { padding-left: 20px; margin-bottom: 10px; }
  .response-panel-body li              { margin-bottom: 3px; }
  .response-panel-body strong          { color: #fff; }
  .response-panel-body code {
    font-family: var(--mono);
    background: rgba(255,255,255,0.06);
    padding: 1px 5px; border-radius: 3px; font-size: 12px;
  }
  .response-panel-body pre {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px; overflow-x: auto; margin-bottom: 10px;
  }
  .response-panel-body pre code { background: none; padding: 0; font-size: 12px; }
  .response-panel-body table {
    border-collapse: collapse; width: 100%; margin-bottom: 10px; font-size: 12px;
  }
  .response-panel-body th,
  .response-panel-body td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; }
  .response-panel-body th { color: var(--cyan); background: rgba(255,255,255,0.03); }

  .error-panel {
    border: 1px solid var(--red); border-radius: 6px;
    padding: 10px 14px; color: var(--red); margin: 8px 0; font-size: 12px;
  }

  .info-table { border-collapse: collapse; margin: 8px 0 12px; font-size: 12px; min-width: 280px; }
  .info-table caption { text-align: left; color: var(--cyan); font-weight: 600; margin-bottom: 6px; font-size: 12px; }
  .info-table th, .info-table td { border: 1px solid var(--border); padding: 4px 10px; }
  .info-table th { color: var(--cyan); background: rgba(255,255,255,0.03); }
</style>
</head>
<body>

<div class="banner">
  <div class="banner-title">🧠 Agentic AI Demo — Web Shell</div>
  <div style="color:var(--dim);font-size:11px;margin-top:3px;">Multi-Agent System · MCP + MongoDB Atlas + Voyage AI</div>
  <div class="banner-meta">
    🍃 MongoDB: <span id="bannerHost">connecting…</span> &nbsp;|&nbsp;
    🔍 Indexes: <span id="bannerIndexes">—</span> &nbsp;|&nbsp;
    Commands: <span style="color:var(--text)">status · preferences</span>
  </div>
</div>

<div class="columns">
  <!-- ── Left: chat ── -->
  <div class="col-chat">
    <div id="history"></div>
    <div class="input-bar">
      <span class="input-prompt">You:</span>
      <input id="queryInput" type="text" placeholder="Ask anything…" autocomplete="off" />
      <span class="input-hint" id="inputHint">↵ send</span>
    </div>
    <div id="rSearchBar"></div>
  </div>

  <!-- ── Right: log + servers ── -->
  <div class="col-log">
    <div class="right-tabs">
      <div class="right-tab active" id="tabLog"          onclick="switchTab('log')">Agent Log</div>
      <div class="right-tab"        id="tabServers"      onclick="switchTab('servers')">MCP Servers</div>
      <div class="right-tab"        id="tabWorkstreams"  onclick="switchTab('workstreams')">Workstreams</div>
    </div>
    <div id="logPanel"></div>
    <div id="serversPanel">
      <!-- populated by renderServers() -->
      <button class="add-server-btn" onclick="openAddModal()">+ Add MCP Server</button>
    </div>
    <div id="workstreamsPanel" style="display:none; padding: 10px 14px; overflow-y: auto;">
      <!-- populated by renderWorkstreams() -->
    </div>
  </div>
</div>

<!-- ── Add server modal ── -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add Cloud MCP Server</h3>
    <div>
      <label>Server name (Python identifier)</label>
      <input id="newName" type="text" placeholder="my_custom_service" />
    </div>
    <div>
      <label>Description (used for semantic routing)</label>
      <input id="newDesc" type="text" placeholder="Handles queries about…" />
    </div>
    <div>
      <label>Python source code</label>
      <textarea id="newCode" placeholder='from mcp.server.fastmcp import FastMCP&#10;mcp = FastMCP("my_service")&#10;&#10;@mcp.tool()&#10;def my_tool() -> str:&#10;    """..."""&#10;    return "Hello!"&#10;&#10;if __name__ == "__main__":&#10;    mcp.run()'></textarea>
    </div>
    <div class="modal-result" id="modalResult"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddServer()">Add Server</button>
    </div>
  </div>
</div>

<script>
const historyEl = document.getElementById('history');
const logPanel  = document.getElementById('logPanel');
const input     = document.getElementById('queryInput');
let   thinking  = false;

// Input history (cursor up/down)
const inputHistory = [];
let   historyPos   = -1;
let   savedDraft   = '';

// ── WebSocket ──────────────────────────────────────────────────────────────
let ws;
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'hello') {
      document.getElementById('bannerHost').textContent    = msg.host || '—';
      document.getElementById('bannerIndexes').textContent = msg.indexes.join(', ') || 'none';
      if (msg.servers.length)
        appendLog('INFO', `✓ Ready — ${msg.servers.length} MCP server(s) active`);
      // Seed cursor-up history from the shared shell history file so
      // arrow-keys recall queries typed earlier (in this session, in a
      // prior browser session, or in the terminal shell).
      if (Array.isArray(msg.history) && msg.history.length) {
        inputHistory.length = 0;
        msg.history.forEach(h => inputHistory.push(h));
        appendLog('INFO', `↑ ${msg.history.length} historic queries loaded`);
      }
      ws.send(JSON.stringify({type: 'server_list'}));
      return;
    }

    if (msg.type === 'server_list') {
      renderServers(msg.servers);
      return;
    }

    if (msg.type === 'server_add_result') {
      document.getElementById('modalResult').textContent = msg.message;
      document.getElementById('modalResult').style.color =
        msg.message.startsWith('✓') ? 'var(--green)' : 'var(--red)';
      renderServers(msg.servers);
      return;
    }

    if (msg.type === 'server_remove_result') {
      appendLog('INFO', msg.message);
      renderServers(msg.servers);
      return;
    }

    if (msg.type === 'workstreams') {
      renderWorkstreams(msg.list);
      return;
    }

    if (msg.type === 'workstream_update') {
      // Single workstream changed via change-stream — refresh the whole
      // list lazily (cheap; the list is bounded). Only re-fetch when the
      // tab is visible, otherwise just invalidate the cache flag.
      if (document.getElementById('workstreamsPanel').style.display !== 'none') {
        requestWorkstreams();
      } else {
        workstreamsLoaded = false;
      }
      return;
    }

    if (msg.type === 'ws_memories') {
      renderWsMemories(msg.workstream_id, msg.memories || []);
      return;
    }

    if (msg.type === 'thinking') {
      const el = document.getElementById('thinkingLine');
      if (el) el.classList.toggle('active', msg.active);
      return;
    }

    if (msg.type === 'broadcast') {
      if (!msg.tag) return;
      const ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
      appendLog(msg.tag, `🤖 ${ts} [${msg.tag}] ${msg.msg}`);
      return;
    }

    if (msg.type === 'response') {
      thinking = false;
      document.getElementById('thinkingLine')?.remove();
      const panel = document.createElement('div');
      panel.className = 'response-panel';
      panel.innerHTML =
        `<div class="response-panel-title">🤖 Agent Response (time needed: ${msg.elapsed} seconds)</div>` +
        `<div class="response-panel-body">${marked.parse(msg.markdown)}</div>`;
      historyEl.appendChild(panel);
      scrollChat();
      return;
    }

    if (msg.type === 'error') {
      thinking = false;
      document.getElementById('thinkingLine')?.remove();
      const el = document.createElement('div');
      el.className = 'error-panel';
      el.textContent = '❌ ' + msg.message;
      historyEl.appendChild(el);
      scrollChat();
      return;
    }

    if (msg.type === 'status') {
      const rows = [
        ['MCP Servers', `${msg.servers.length} active`],
        ...msg.servers.map(s => [`  ↳ ${s}`, '✓ Online']),
        ['Memory Store', 'MongoDB Atlas'],
      ];
      appendTable('System Status', ['Component', 'Status'], rows);
      return;
    }

    if (msg.type === 'memory') {
      if (!msg.rows.length) { appendInfoLine('No memories stored yet.'); return; }
      const rows = msg.rows.map(r => [r.ts, r.text, r.category, r.type]);
      appendTable('🧠 User Preferences', ['Timestamp', 'Preference', 'Category', 'Type'], rows);
      return;
    }
  };

  ws.onclose = () => {
    appendLog('ERROR', 'Disconnected — reconnecting in 3s…');
    setTimeout(connect, 3000);
  };
}

// ── Reverse history search (Ctrl+R / bck-i-search) ───────────────────────
const rSearchBar = document.getElementById('rSearchBar');
const inputHint  = document.getElementById('inputHint');
let rsActive   = false;
let rsQuery    = '';
let rsMatchIdx = -1;

function rsEnter() {
  rsActive   = true;
  rsQuery    = '';
  rsMatchIdx = -1;
  savedDraft = input.value;
  rSearchBar.style.display = 'block';
  inputHint.textContent    = 'esc cancel';
  input.value = savedDraft;
  input.setSelectionRange(savedDraft.length, savedDraft.length);
  rsRender();
}

function rsExit(accept) {
  rsActive                 = false;
  rSearchBar.style.display = 'none';
  inputHint.textContent    = '↵ send';
  if (!accept) {
    input.value = savedDraft;
    input.setSelectionRange(savedDraft.length, savedDraft.length);
  } else {
    // collapse selection to cursor at end
    const len = input.value.length;
    input.setSelectionRange(len, len);
  }
  rsQuery    = '';
  rsMatchIdx = -1;
}

function rsSearch(fromIdx) {
  if (!rsQuery) {
    rsMatchIdx = -1;
    input.value = savedDraft;
    input.setSelectionRange(savedDraft.length, savedDraft.length);
    return;
  }
  const q = rsQuery.toLowerCase();
  for (let i = fromIdx; i < inputHistory.length; i++) {
    if (inputHistory[i].toLowerCase().includes(q)) {
      rsMatchIdx = i;
      const full = inputHistory[i];
      input.value = full;
      // place cursor at start of match; select through end of match
      const idx = full.toLowerCase().indexOf(q);
      input.setSelectionRange(idx, idx + rsQuery.length);
      return;
    }
  }
  rsMatchIdx = -1;
  // keep current input text, don't clobber
}

function rsRender() {
  if (!rsActive) return;
  // bck-i-search: <query>_   [pre][UNDERLINED match][post]
  const prefix = `bck-i-search: `;
  let body;
  if (!rsQuery) {
    body = `<span class="rsq"></span>_`;
  } else if (rsMatchIdx >= 0) {
    const full = inputHistory[rsMatchIdx];
    const idx  = full.toLowerCase().indexOf(rsQuery.toLowerCase());
    body = `<span class="rsq">${esc(rsQuery)}</span>_  `
         + esc(full.slice(0, idx))
         + `<span class="rsu">${esc(full.slice(idx, idx + rsQuery.length))}</span>`
         + esc(full.slice(idx + rsQuery.length));
  } else {
    body = `<span class="rsq">${esc(rsQuery)}</span>_  `
         + `<span style="color:var(--dim)">(no match)</span>`;
  }
  rSearchBar.innerHTML = prefix + body;
}

// ── Submit ─────────────────────────────────────────────────────────────────
input.addEventListener('keydown', (e) => {
  // ── Ctrl+R: enter / cycle reverse search ──
  if (e.ctrlKey && e.key === 'r') {
    e.preventDefault();
    if (!rsActive) {
      savedDraft = input.value;
      rsEnter();
    } else {
      // cycle to next older match
      const start = rsMatchIdx >= 0 ? rsMatchIdx + 1 : 0;
      rsSearch(start);
      rsRender();
    }
    return;
  }

  // ── Keys while in reverse-search mode ──
  if (rsActive) {
    if (e.key === 'Escape' || (e.ctrlKey && (e.key === 'g' || e.key === 'c'))) {
      e.preventDefault();
      rsExit(false);
      return;
    }
    if (e.key === 'Enter') {
      // accept current match and fall through to normal submit
      rsExit(true);
      // let Enter propagate to the submit block below
    } else if (e.key === 'Backspace') {
      e.preventDefault();
      rsQuery = rsQuery.slice(0, -1);
      rsSearch(0);
      rsRender();
      return;
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      rsQuery += e.key;
      rsSearch(0);
      rsRender();
      return;
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      // place cursor in input and exit search without clearing value
      rsExit(true);
      return;
    } else if (e.key !== 'Enter') {
      return; // ignore other special keys in search mode
    }
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (!inputHistory.length) return;
    if (historyPos === -1) savedDraft = input.value;
    historyPos = Math.min(historyPos + 1, inputHistory.length - 1);
    input.value = inputHistory[historyPos];
    input.setSelectionRange(input.value.length, input.value.length);
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyPos === -1) return;
    historyPos--;
    input.value = historyPos === -1 ? savedDraft : inputHistory[historyPos];
    input.setSelectionRange(input.value.length, input.value.length);
    return;
  }
  if (e.key !== 'Enter') return;
  const text = input.value.trim();
  if (!text || thinking) return;
  inputHistory.unshift(text);
  historyPos = -1;
  savedDraft = '';
  input.value = '';

  historyEl.appendChild(Object.assign(document.createElement('hr'), {className: 'turn-sep'}));

  const youLine = document.createElement('div');
  youLine.className = 'you-line';
  youLine.innerHTML = `You: <span>${esc(text)}</span>`;
  historyEl.appendChild(youLine);

  const thinkEl = document.createElement('div');
  thinkEl.id = 'thinkingLine';
  thinkEl.className = 'thinking active';
  thinkEl.innerHTML = `<span class="thinking-dot">▌</span> Thinking…`;
  historyEl.appendChild(thinkEl);
  scrollChat();

  const lower = text.toLowerCase();
  if (lower === 'status') {
    ws.send(JSON.stringify({type: 'command', cmd: 'status'}));
    thinkEl.classList.remove('active');
  } else if (lower === 'preferences' || lower === 'memory') {
    ws.send(JSON.stringify({type: 'command', cmd: 'preferences'}));
    thinkEl.classList.remove('active');
  } else {
    thinking = true;
    ws.send(JSON.stringify({type: 'query', text}));
  }
});

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// Render markdown and strip the outer <p>…</p> wrap for inline contexts.
function md(s) {
  if (!s) return '';
  const html = marked.parse(String(s));
  return html.replace(/^<p>([\s\S]*)<\/p>\n?$/, '$1');
}
function scrollChat() { historyEl.scrollTop = historyEl.scrollHeight; }
function scrollLog()  { logPanel.scrollTop  = logPanel.scrollHeight;  }

// Tags whose content is LLM-generated text and should be markdown-rendered.
const _MD_TAGS = new Set(['RESULT', 'MEMORY', 'PREFERENCES', 'WORKSTREAM']);

function appendLog(tag, text) {
  const el = document.createElement('div');
  el.className = `log-entry tag-${tag}`;
  const body = _MD_TAGS.has(tag) ? md(text) : esc(text);
  el.innerHTML = `<span class="log-tag"></span>${body}`;
  logPanel.appendChild(el);
  scrollLog();
}

function appendInfoLine(text) {
  const el = document.createElement('div');
  el.className = 'log-entry tag-INFO';
  el.textContent = text;
  logPanel.appendChild(el);
  scrollLog();
}

function appendTable(caption, headers, rows) {
  const t = document.createElement('table');
  t.className = 'info-table';
  t.innerHTML =
    `<caption>${esc(caption)}</caption>` +
    `<tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>` +
    rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c||'')}</td>`).join('')}</tr>`).join('');
  historyEl.appendChild(t);
  scrollChat();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('logPanel').style.display         = tab === 'log'         ? '' : 'none';
  document.getElementById('serversPanel').classList.toggle('visible', tab === 'servers');
  document.getElementById('workstreamsPanel').style.display = tab === 'workstreams' ? '' : 'none';
  document.getElementById('tabLog').classList.toggle('active',         tab === 'log');
  document.getElementById('tabServers').classList.toggle('active',     tab === 'servers');
  document.getElementById('tabWorkstreams').classList.toggle('active', tab === 'workstreams');
  if (tab === 'workstreams' && !workstreamsLoaded) {
    requestWorkstreams();
  }
  if (tab === 'log') {
    scrollLog();
  }
}

// ── Workstream rendering ───────────────────────────────────────────────────
let workstreamsLoaded = false;
function requestWorkstreams() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: "workstreams_request"}));
  }
}
function renderWorkstreams(list) {
  workstreamsLoaded = true;
  const panel = document.getElementById('workstreamsPanel');
  panel.innerHTML = '';
  if (!list || !list.length) {
    panel.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:8px 0;">'
                      + 'No workstreams yet. Start a query to open one.</div>';
    return;
  }
  // Group by state, open first
  const groups = {open: [], paused: [], completed: [], cancelled: []};
  list.forEach(w => {
    (groups[w.state] || (groups[w.state] = [])).push(w);
  });
  ['open', 'paused', 'completed', 'cancelled'].forEach(state => {
    const items = groups[state] || [];
    if (!items.length) return;
    const heading = document.createElement('div');
    heading.style.cssText =
      'font-size: 10px; letter-spacing: 1.2px; color: var(--cyan); '
      + 'text-transform: uppercase; margin: 14px 0 6px;';
    heading.textContent = state + '  (' + items.length + ')';
    panel.appendChild(heading);
    items.forEach(w => panel.appendChild(renderWorkstreamCard(w)));
  });
}
function renderWorkstreamCard(w) {
  const card = document.createElement('div');
  card.style.cssText =
    'border: 1px solid var(--border); border-radius: 4px; '
    + 'padding: 10px 12px; margin: 6px 0; background: rgba(255,255,255,0.02); '
    + 'font-size: 12px;';
  const entities = (w.entities || []).slice(0, 8).map(esc).join(', ');
  const lastTs = w.last_activity ? new Date(w.last_activity).toLocaleString() : '—';
  const stateEmoji = ({open:'🟢', paused:'⏸', completed:'✓', cancelled:'⊗'})[w.state] || '•';
  const numCalls = (w.tool_calls || []).length;
  const memCount = w.memories_extracted_count || 0;
  card.innerHTML =
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">`
    + `  <span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);">${esc(w._id)}</span>`
    + `  <span style="color:var(--dim);">${stateEmoji} ${esc(w.state || '?')}</span>`
    + `  <span style="background:rgba(0,212,255,0.12);color:var(--cyan);`
    + `         padding:1px 6px;border-radius:3px;font-size:10px;">${esc(w.domain || '—')}</span>`
    + (memCount > 0
        ? `  <span class="mem-badge" data-wsid="${esc(w._id)}" `
          + `title="Click to view extracted memories" `
          + `style="background:rgba(255,215,0,0.15);color:#FFD700;`
          + `padding:1px 6px;border-radius:3px;font-size:10px;cursor:pointer;">`
          + `💎 ${memCount} memor${memCount === 1 ? 'y' : 'ies'}</span>`
        : '')
    + `  <span style="margin-left:auto;color:var(--dim);font-size:11px;">${lastTs}</span>`
    + `</div>`
    + (w.title ? `<div style="margin-bottom:6px;">${esc(w.title)}</div>` : '')
    + (entities ? `<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">`
                  + `entities: ${entities}</div>` : '')
    + (numCalls ? `<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">`
                  + `${numCalls} tool call${numCalls === 1 ? '' : 's'}</div>` : '')
    + (w.summary ? `<div class="ws-summary-md" style="font-size:11px;color:var(--fg);opacity:0.85;`
                   + `line-height:1.4;border-left:2px solid var(--cyan);padding-left:8px;">`
                   + `${md(w.summary)}</div>` : '')
    + (memCount > 0
        ? `<div class="mem-subpanel" id="mem-${esc(w._id)}" style="display:none;`
          + `margin-top:8px;border-top:1px solid var(--border);padding-top:8px;"></div>`
        : '');

  // wire up badge click
  const badge = card.querySelector('.mem-badge');
  if (badge) {
    badge.addEventListener('click', () => toggleMemoryPanel(w._id));
  }
  return card;
}

// ── Workstream memory sub-panel ───────────────────────────────────────────
const _memPanelOpen = new Set();   // ws_ids currently expanded
const _memCache     = {};          // ws_id → memories array

function toggleMemoryPanel(wsId) {
  const panel = document.getElementById('mem-' + wsId);
  if (!panel) return;
  if (_memPanelOpen.has(wsId)) {
    _memPanelOpen.delete(wsId);
    panel.style.display = 'none';
    return;
  }
  _memPanelOpen.add(wsId);
  panel.style.display = '';
  if (_memCache[wsId]) {
    renderWsMemories(wsId, _memCache[wsId]);
  } else {
    panel.innerHTML = '<div style="color:var(--dim);font-size:11px;">Loading…</div>';
    ws.send(JSON.stringify({type: 'ws_memories_request', workstream_id: wsId}));
  }
}

function renderWsMemories(wsId, mems) {
  _memCache[wsId] = mems;
  const panel = document.getElementById('mem-' + wsId);
  if (!panel || !_memPanelOpen.has(wsId)) return;
  if (!mems.length) {
    panel.innerHTML = '<div style="color:var(--dim);font-size:11px;">No memories extracted.</div>';
    return;
  }
  const tierColor = {core: '#00d4ff', extracted: '#FFD700', decayed: '#666'};
  panel.innerHTML =
    '<div style="font-size:10px;letter-spacing:1px;color:var(--cyan);'
    + 'text-transform:uppercase;margin-bottom:6px;">💎 Extracted memories</div>'
    + mems.map(m => {
        const conf  = Math.round((m.confidence || 0) * 100);
        const tc    = tierColor[m.tier] || '#aaa';
        const ents  = (m.entities || []).slice(0, 4).map(esc).join(', ');
        const rcl   = m.recall_count ? `· recalled ${m.recall_count}×` : '';
        return `<div style="margin-bottom:8px;padding:6px 8px;`
             + `background:rgba(255,215,0,0.06);border-radius:3px;`
             + `border-left:2px solid ${tc};">`
             + `<div style="font-size:11px;color:var(--fg);line-height:1.4;">${md(m.text)}</div>`
             + `<div style="font-size:10px;color:var(--dim);margin-top:3px;">`
             + `<span style="color:${tc};">${esc(m.tier)}</span>`
             + ` · ${esc(m.category)} · ${conf}% confidence ${rcl}`
             + (ents ? ` · entities: ${ents}` : '')
             + `</div></div>`;
      }).join('');
}

// ── Server management ──────────────────────────────────────────────────────
function renderServers(servers) {
  const panel = document.getElementById('serversPanel');
  panel.querySelectorAll('.server-row, .servers-empty').forEach(el => el.remove());
  const addBtn = panel.querySelector('.add-server-btn');
  // Active servers first, then idle — alphabetical within each group
  const sorted = [...servers].sort((a, b) => {
    if (a.active !== b.active) return a.active ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  sorted.forEach(s => {
    const row = document.createElement('div');
    row.className = 'server-row';
    const statusDot = s.active
      ? `<span class="server-active">● active</span>`
      : `<span class="server-inactive">○ idle</span>`;
    row.innerHTML =
      `<span class="server-name">${esc(s.name)}</span>` +
      `${statusDot}` +
      `<span class="server-badge ${s.origin}">${s.origin}</span>` +
      `<button class="server-remove" onclick="removeServer('${esc(s.name)}')">remove</button>`;
    panel.insertBefore(row, addBtn);
  });
  if (!sorted.length) {
    const empty = document.createElement('div');
    empty.className = 'servers-empty';
    empty.style.cssText = 'color:var(--dim);font-size:11px;padding:4px 0;';
    empty.textContent = 'No servers registered.';
    panel.insertBefore(empty, addBtn);
  }
}

function removeServer(name) {
  if (!confirm(`Remove server '${name}'?`)) return;
  ws.send(JSON.stringify({type: 'server_remove', name}));
}

function openAddModal() {
  document.getElementById('newName').value   = '';
  document.getElementById('newDesc').value   = '';
  document.getElementById('newCode').value   = '';
  document.getElementById('modalResult').textContent = '';
  document.getElementById('addModal').classList.add('visible');
  document.getElementById('newName').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('visible');
}

function submitAddServer() {
  const name = document.getElementById('newName').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  const code = document.getElementById('newCode').value.trim();
  if (!name || !desc || !code) {
    document.getElementById('modalResult').textContent = '⚠ All fields are required.';
    document.getElementById('modalResult').style.color = 'var(--yellow)';
    return;
  }
  document.getElementById('modalResult').textContent = 'Adding…';
  document.getElementById('modalResult').style.color = 'var(--dim)';
  ws.send(JSON.stringify({type: 'server_add', name, description: desc, source_code: code}));
}

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeAddModal();
});

connect();
input.focus();
</script>
