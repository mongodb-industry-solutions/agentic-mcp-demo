name: AgentLiveWatch
options:
  bundleIdPrefix: com.benjaminlorenz
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  AgentLiveWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: AgentLiveWatch/Sources
      - path: AgentLiveWatch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjaminlorenz.agentlivewatch
        PRODUCT_NAME: AgentLiveWatch
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AgentLive
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K9LSAPMDRX
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: NO

schemes:
  AgentLiveWatch Watch App:
    build:
      targets:
        AgentLiveWatch Watch App: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
    analyze:
      config: Debug
    profile:
      config: Release
