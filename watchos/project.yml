name: AgentLiveWatch
options:
  bundleIdPrefix: com.benjaminlorenz
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  AgentLiveWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: AgentLiveWatch/Sources
      - path: AgentLiveWatch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjaminlorenz.agentlivewatch
        PRODUCT_NAME: AgentLiveWatch
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
